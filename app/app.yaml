command:
  - "streamlit"
  - "run"
  - "app.py"
  - "--server.port"
  - "8000"
  - "--server.address"
  - "0.0.0.0"

env:
  - name: "DATABRICKS_WAREHOUSE_ID"
    valueFrom: "warehouse_id"
  - name: "LAKEBASE_HOST"
    valueFrom: "lakebase_host"
  - name: "LAKEBASE_DB"
    valueFrom: "lakebase_db"
  - name: "LAKEBASE_USER"
    valueFrom: "lakebase_user"
  - name: "LLM_ENDPOINT"
    value: "databricks-meta-llama-3-3-70b-instruct"
  - name: "UC_CATALOG"
    value: "hackathon"
  - name: "UC_SCHEMA"
    value: "trust_desk"
